# API Configuration

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  reload: false

model:
  model_path: "models"
  default_version: "latest"
  preload_on_startup: true

# API Security
security:
  enable_auth: false
  auth_type: "api_key"  # Options: api_key, jwt, oauth2

# Rate limiting
rate_limiting:
  enabled: true
  requests_per_minute: 60
  requests_per_second: 2

# CORS
cors:
  enabled: true
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST"]

# Logging
logging:
  level: "INFO"
  format: "json"
